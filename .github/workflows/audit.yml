name: Repo Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "20 3 * * 1"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate content
        run: python scripts/validate_content.py

      - name: Security audit
        run: python scripts/security_audit.py

      - name: Dry-run YouTube description plan
        run: python scripts/update_yt_desc.py --descriptions scripts/descriptions.json --dry-run
